<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audio Training System</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="container">

    <h1>🎵 Голос</h1>

    <!-- Generator Block -->
    <div id="generator-block" class="block">
      <h3>🎹 Генератор</h3>

      <div class="gen-header">
        <input type="text" id="gen-name" placeholder="Название" class="gen-name">
        <button id="reset-generator">🔄 Сброс</button>
      </div>

      <div class="gen-main">
        <label>Тип:
          <select id="gen-waveform">
            <option value="sine">Sine</option>
            <option value="square">Square</option>
            <option value="sawtooth">Sawtooth</option>
            <option value="triangle">Triangle</option>
          </select>
        </label>
        <label>Частота (Hz):
          <input type="number" id="gen-frequency" value="440" min="20" max="20000">
        </label>
        <label>Амплитуда:
          <input type="range" id="gen-amplitude" min="0" max="1" step="0.05" value="0.5">
          <span id="gen-amplitude-value">0.5</span>
        </label>
        <button id="add-harmonic">+ Гармоника</button></div>


      <div id="harmonics-list">

      <div class="gen-buttons">

        <button id="apply-generator">Применить</button>
        <button id="save-preset">💾 Сохранить</button>
        <button id="toggle-generator" data-state="off">🔘 <span class="status">OFF</span></button>
      </div>
    </div>
    </div>

    <!-- GeneratorPresets Block -->
    <div id="presets-block" class="block">
      <h3>💾 Пресеты</h3>
      <div class="presets-actions">
        <button id="export-presets">📤 Экспорт</button>
        <label class="btn">
          📥 Импорт
          <input type="file" id="import-preset" accept=".json" style="display:none">
        </label>
      </div>
      <div id="presets-list"></div>
    </div>

    <!-- SoundTrack Block -->
    <div id="track-block" class="block">
      <h3>🎵 Звуковая Дорожка</h3>
      <div class="track-controls">
        <select id="track-preset-select"></select>
        <input type="number" id="track-duration" value="1.0" step="0.1" min="0.1" max="30">
        <input type="range" id="track-amplitude" min="0" max="1" step="0.1" value="0.5">
        <button id="add-track-element">+ Добавить</button>
      </div>
      <div id="track-list"></div>
      <div class="track-buttons">
        <button id="play-track">▶ Play</button>
        <button id="stop-track">⏹ Stop</button>
        <button id="save-track">💾 Сохранить</button>
        <span id="track-duration-total">0.0s</span>
      </div>
    </div>

    <!-- Microphone Block -->
    <div id="microphone-block" class="block">
      <h3>🎤 Микрофон</h3>
      <div class="mic-controls">
        <button id="toggle-microphone" data-state="off">🔘 <span class="status">OFF</span></button>
        <button id="toggle-recorder" data-state="off">🔴 <span class="status">OFF</span></button>
        <button id="capture-voice">🎤 Поймать</button>
      </div>
      <div class="mic-filters">
        <label>Lowpass: <input type="range" id="mic-lowpass" min="80" max="8000" value="8000"><span id="mic-lowpass-value">8000</span></label>
        <label>Highpass: <input type="range" id="mic-highpass" min="20" max="500" value="60"><span id="mic-highpass-value">60</span></label>
        <label>Noise Gate: <input type="range" id="mic-noise-gate" min="-60" max="0" value="-42"><span id="mic-noise-gate-value">-42</span></label>
        <label>Compressor: <input type="range" id="mic-compressor-threshold" min="-40" max="0" value="-20"><span id="mic-compressor-threshold-value">-20</span></label>
      </div>
    </div>

    <!-- Analyzer Block -->
    <div id="analyzer-block" class="block analyzer-block">
      <h3>📊 Анализ Звука</h3>

      <!-- Основные показатели -->
      <div class="metrics-grid">
        <div class="metric-card">
          <span class="metric-label">Громкость (RMS)</span>
          <span class="metric-value" id="rms-value">0.00</span>
          <div class="metric-bar">
            <div class="metric-fill" id="rms-bar"></div>
          </div>
        </div>

        <div class="metric-card">
          <span class="metric-label">Частота (Pitch)</span>
          <span class="metric-value" id="pitch-value">-- Hz</span>
          <span class="metric-note" id="note-name">--</span>
        </div>

        <div class="metric-card">
          <span class="metric-label">Zero Crossing</span>
          <span class="metric-value" id="zcr-value">0.00</span>
        </div>
      </div>

      <!-- Спектральный график -->
      <div class="spectrum-container">
        <canvas id="spectrum-canvas" width="800" height="200"></canvas>
      </div>

      <!-- Обнаруженные гармоники (текущие) -->
      <div class="harmonics-section">
        <h4>🎵 Текущие Гармоники</h4>
        <div class="harmonics-list" id="current-harmonics"></div>
      </div>

      <!-- Усредненные гармоники (стабильные) -->
      <div class="harmonics-section">
        <h4>📈 Усредненные Гармоники</h4>
        <div class="harmonics-list" id="average-harmonics"></div>
      </div>

      <!-- Визуализация гармоник -->
      <div class="harmonics-viz">
        <canvas id="harmonics-canvas" width="800" height="150"></canvas>
      </div>
    </div>

    <!-- Блок 5: Storage -->
    <section class="block" id="storage-block">
      <h2>💾 Хранилище</h2>
      <div id="storage-list" class="storage-list"></div>
    </section>

    <!-- Блок 6: AudioCatcher -->
    <section class="block" id="catcher-block">
      <h2>🎯 Распознавание (AudioCatcher)</h2>
      <div class="catcher-controls">
        <button id="enable-catcher" class="btn-primary">Включить Распознавание</button>
        <button id="add-selected-to-catcher" class="btn-secondary">Добавить Выбранное в Эталоны</button>
      </div>
      <div id="catcher-templates" class="catcher-templates"></div>
    </section>
  </div>


  <!-- Скрипты -->
  <script src="js/config.js"></script>
  <!-- coreParent -->
  <script src="js/core/EventEmitter.js"></script>
  <!-- core -->
  <script src="js/core/Generator.js"></script>
  <script src="js/core/Microphone.js"></script>
  <script src="js/core/Analyzer.js"></script>
  <!-- ? temp to delete -->
  <script src="js/core/AudioCatcher.js"></script>
  <script src="js/core/Player.js"></script>
  <script src="js/core/Storage.js"></script>
  <script src="js/core/Recorder.js"></script>
  <script src="js/core/AudioComparator.js"></script>
  <!-- features -->
  <script src="js/features/GeneratorPresets.js"></script>
  <script src="js/features/SoundTrack.js"></script>
  <!-- ui-->
  <script src="js/ui/UIManager.js"></script>
  <script src="js/ui/GeneratorUI.js"></script>
  <script src="js/ui/PresetsUI.js"></script>
  <script src="js/ui/TrackUI.js"></script>
  <script src="js/ui/MicrophoneUI.js"></script>

  <!-- ? temp to delete-->

  <!-- main app -->
  <!-- <script src="js/main.js"></script> -->
  <script src="js/app.js"></script>

</body>

</html>
